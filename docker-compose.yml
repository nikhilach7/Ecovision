version: "3.9"
services:
  mongodb:
    image: mongo:7
    container_name: ecovision-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecovision-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: ecovision
      MODEL_PATH: /app/model/waste_classifier.keras
      CONFIDENCE_THRESHOLD: 0.45
      CORS_ORIGINS: http://localhost:5173
      JWT_SECRET: change-this-in-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      STORAGE_BACKEND: local
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_model:/app/model

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000/api
    container_name: ecovision-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongo_data:
  backend_uploads:
  backend_model:
